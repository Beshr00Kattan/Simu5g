[General]
image-path=../../../images
output-scalar-file-append = false
sim-time-limit=20s
**.routingRecorder.enabled = false

############### Statistics ##################
output-scalar-file = ${resultdir}/${configname}/${repetition}.sca
output-vector-file = ${resultdir}/${configname}/${repetition}.vec
seed-set = ${repetition}
**.vector-recording = false

################ Mobility parameters #####################
# *

**.mobility.constraintAreaMaxX = 1000m
**.mobility.constraintAreaMaxY = 1000m
**.mobility.constraintAreaMinX = 0m
**.mobility.constraintAreaMinY = 0m
**.mobility.constraintAreaMinZ = 0m
**.mobility.constraintAreaMaxZ = 0m
**.mobility.initFromDisplayString = false

############### Number of Resource Blocks ################
**.numBands = 50 # this value should be kept equal to the number of RBs

############### Transmission Power ##################
**.ueTxPower = 5
**.eNodeBTxPower = 10
**.targetBler = 0.01
**.blerShift = 5  

############### IPv4 configurator config #################
*.configurator.config = xmldoc("./demo.xml")


#------------------------------------#
# Config Standalone
#
# Topology configuration for the exemplary scenario for NR Standalone deployment
#
[Config Standalone]
network = simu5g.simulations.NR.networks.SingleCell_Standalone
sim-time-limit=20s

############### e/gNodeB configuration #################
*.gnb.mobility.initialX = 450m
*.gnb.mobility.initialY = 300m

############## UE configuration ##################
*.numUe = 1

# connect the UE's NIC to the corresponding serving gNB (NR side only)
*.ue[0].macCellId = 0
*.ue[0].masterId = 0
*.ue[0].nrMacCellId = 1
*.ue[0].nrMasterId = 1

# UE position
*.ue[0].mobility.initialX = 450m
*.ue[0].mobility.initialY = 350m
#------------------------------------#



#------------------------------------#
# Config VoIP-DL
#
# General configuration for Voice-over-IP DL traffic to the UE
# 
[Config VoIP-DL]
extends=Standalone

# one UDP application for each user
*.ue[*].numApps = 1

# the amount of UDP applications on server should be equal to (numUEs)*(ue[*].numApps) 
*.server.numApps = 1

#============= Application Setup =============
*.ue[*].app[*].typename = "VoIPReceiver"
*.ue[*].app[0].localPort = 3000

*.server.app[*].PacketSize = 40
*.server.app[*].destAddress = "ue[0]" # obtain the address of the client by reading its index in the array of udp Apps
*.server.app[*].localPort = 3088+ancestorIndex(0) 
*.server.app[*].typename = "VoIPSender"
*.server.app[*].startTime = uniform(0s,0.02s)
#------------------------------------#



#------------------------------------#
# Config VoIP-UL
#
# General configuration for Voice-over-IP UL traffic from the UE
# 
[Config VoIP-UL]
extends=Standalone

# one UDP application for each user
*.ue[*].numApps = 1

# the amount of UDP applications on server should be equal to (numUEs)*(ue[*].numApps) 
*.server.numApps = 1

#============= Application Setup =============
*.server.app[*].typename = "VoIPReceiver"
*.server.app[*].localPort = 3000+ancestorIndex(0)

*.ue[*].app[*].PacketSize = 40
# obtain the address of the client by reading its index in the array of udp Apps
*.ue[*].app[*].destAddress = "server" 
*.ue[*].app[*].localPort = 3088+ancestorIndex(0)
*.ue[*].app[*].typename = "VoIPSender"
*.ue[*].app[*].startTime = uniform(0s,0.02s)
#------------------------------------#



#------------------------------------#
# Config EthernetPduSession
#
# Real 3GPP Ethernet PDU Session (TS 23.501 SS5.6.10.2): the server sends a
# real, byte-serialized, 802.1Q-VLAN-tagged Ethernet frame (built by
# TsnEtherApp, reused on both ends) over a REAL, pure-Ethernet path --
# server.tsnEth -- tsnSwitch -- upf.tsnEth -- with NO IP/UDP anywhere on that
# leg, and no router in the topology at all any more (see
# doc/ethernet-pdu-session/16-router-removal-unified-frame.md). The frame is
# classified by real destination MAC (not IP) at the UPF's TrafficFlowFilter,
# carried inside a real GTP-U tunnel to the gNB, and delivered to the UE's
# TsnEtherApp sink with no IP/UDP/ROHC involved at any point end-to-end. See
# doc/ethernet-pdu-session/ for the full file-by-file documentation.
#
[Config EthernetPduSession]
extends=Standalone

# Real 3GPP Ethernet PDU Session work: long enough to send 20000 frames at
# sendInterval=0.01s starting at startTime=0.01s (last send at t=200.00s),
# plus a few seconds of buffer for the last few in-flight frames to actually
# arrive at the UE. Overrides General's/Standalone's 20s default for this
# config only -- VoIP-DL/VoIP-UL/plain Standalone are unaffected.
sim-time-limit = 205s

# This UE's PDU session is of type Ethernet (Binder::PduSessionType), not
# the default IPv4 -- see doc/ethernet-pdu-session/04-binder-pdu-session-type.md.
*.ue[0].pduSessionType = "Ethernet"
*.ue[0].tsnMac = "00:00:00:00:00:02"

# Real 3GPP Ethernet PDU Session work (MAC-in-MAC N3): make the UPF<->gNB N3 leg
# IP-less (outer-Ethernet / IEEE 802.1ah instead of GTP-U/UDP/IP), so the ENTIRE
# server->UE path carries Ethernet with no IP. Set "gtp" to restore the standard
# 3GPP tunnel. See doc/ethernet-pdu-session/31-macinmac-n3.md.
*.upf.gtp_user.n3Transport = "ethernet"
*.gnb.gtpUser.n3Transport = "ethernet"

# No ordinary IP/UDP apps run in this scenario -- the Ethernet PDU session
# traffic is generated by TsnEtherApp on both ends (server = source, UE = sink).
*.ue[*].numApps = 0
*.server.numApps = 0

#============= Ethernet PDU session source (server, AF side) =============
# Real L2 send: server.l2App[0] is wired DIRECTLY to server.tsnEth (see
# EthernetPduSessionHost.ned) -- no inet::EthernetEncapsulation, no "nl"
# dispatcher, no UdpSocket, no IP anywhere on this leg. TsnEtherApp itself
# builds the one real outer EthernetMacHeader a real EthernetMac requires.
*.server.numL2Apps = 1
*.server.l2App[0].typename = "TsnEtherApp"
*.server.l2App[0].srcMac = "00:00:00:00:00:01"
*.server.l2App[0].destMac = "00:00:00:00:00:02"
*.server.l2App[0].interfaceName = "tsnEth"
*.server.l2App[0].vid = 1
*.server.l2App[0].pcp = 5
*.server.l2App[0].sendInterval = 0.01s
*.server.l2App[0].packetLength = 300B
*.server.l2App[0].startTime = 0.01s

#============= Ethernet PDU session sink (UE side) =============
*.ue[0].numL2Apps = 1
*.ue[0].l2App[0].typename = "TsnEtherApp"
*.ue[0].l2App[0].srcMac = "00:00:00:00:00:02"
*.ue[0].l2App[0].destMac = "" # empty destMac -- this instance is a pure sink, see L2App::initialize()

#============= Layer B: real PCP-based priority queueing (server egress) =============
# See doc/ethernet-pdu-session/12-pcp-priority-queue.md. Wired on the
# server's dedicated tsnEth interface (the real N6 leg). Explicitly does NOT
# implement 802.1Qbv gate-control-list / time-synchronized scheduling -- see
# TsnPcpClassifier.ned's own header comment and the final report's scope section.
*.server.tsnEth.queue.typename = "inet.queueing.queue.PriorityQueue"
*.server.tsnEth.queue.numQueues = 2
*.server.tsnEth.queue.classifier.typename = "simu5g.apps.l2.TsnPcpClassifier"
#------------------------------------#


#------------------------------------#
# Config EthernetPduSession-MultiUE
#
# Real 3GPP Ethernet PDU Session work (multi-UE): the same IP-less MAC-in-MAC
# scenario as EthernetPduSession, but with FIVE UEs, all served by the single
# gNB, each with its own Ethernet PDU session and a distinct MAC address. This
# demonstrates that the MAC-based UPF classification (TrafficFlowFilter), the
# Binder MAC<->UE registry, the real learning MacForwardingTable, and the whole
# MAC-in-MAC N3 path scale to N UEs with NO code changes -- the only additions
# are per-UE config plus one TsnEtherApp sender per destination on the server
# (they fan into the single tsnEth interface through l2Dispatcher, see
# EthernetPduSessionHost.ned).
#
[Config EthernetPduSession-MultiUE]
extends = EthernetPduSession

# Five UEs, all attached to the single gNB. The macCellId/masterId wildcards
# cover ue[1..4]; ue[0]'s identical values are inherited from [Config Standalone].
*.numUe = 5
*.ue[*].macCellId = 0
*.ue[*].masterId = 0
*.ue[*].nrMacCellId = 1
*.ue[*].nrMasterId = 1

# Distinct positions spread around the gNB (which sits at x=450, y=300), all
# well inside the 1000x1000 constraint area and close enough for a good channel.
# ue[0] keeps its inherited (450,350) position.
*.ue[1].mobility.initialX = 400m
*.ue[1].mobility.initialY = 380m
*.ue[2].mobility.initialX = 500m
*.ue[2].mobility.initialY = 380m
*.ue[3].mobility.initialX = 400m
*.ue[3].mobility.initialY = 250m
*.ue[4].mobility.initialX = 500m
*.ue[4].mobility.initialY = 250m

# Every UE is an Ethernet PDU session with its own MAC + a TsnEtherApp sink.
# ue[0]'s pduSessionType/tsnMac (=..:02) come from EthernetPduSession.
*.ue[*].pduSessionType = "Ethernet"
*.ue[1].tsnMac = "00:00:00:00:00:03"
*.ue[2].tsnMac = "00:00:00:00:00:04"
*.ue[3].tsnMac = "00:00:00:00:00:05"
*.ue[4].tsnMac = "00:00:00:00:00:06"

*.ue[*].numL2Apps = 1
*.ue[*].l2App[0].typename = "TsnEtherApp"
*.ue[1].l2App[0].srcMac = "00:00:00:00:00:03"
*.ue[2].l2App[0].srcMac = "00:00:00:00:00:04"
*.ue[3].l2App[0].srcMac = "00:00:00:00:00:05"
*.ue[4].l2App[0].srcMac = "00:00:00:00:00:06"
*.ue[*].l2App[0].destMac = ""   # every UE instance is a pure sink

# Server runs FIVE sender apps -- one per destination UE -- sharing the single
# tsnEth interface via l2Dispatcher. They must NOT each register the ethernetMac
# protocol (that collides on the dispatcher, which allows one provider per
# protocol); tsnEncap registers it instead. See EthernetPduSessionHost.ned.
# l2App[0] (-> ue[0], ..:02) and the common params are inherited from
# EthernetPduSession; here we add apps 1..4 and the registerOwnProtocol override.
*.server.numL2Apps = 5
*.server.l2App[*].typename = "TsnEtherApp"
*.server.l2App[*].registerOwnProtocol = false
*.server.l2App[*].srcMac = "00:00:00:00:00:01"
*.server.l2App[*].interfaceName = "tsnEth"
*.server.l2App[*].vid = 1
*.server.l2App[*].pcp = 5
*.server.l2App[*].sendInterval = 0.01s
*.server.l2App[*].packetLength = 300B
*.server.l2App[*].startTime = 0.01s
*.server.l2App[1].destMac = "00:00:00:00:00:03"
*.server.l2App[2].destMac = "00:00:00:00:00:04"
*.server.l2App[3].destMac = "00:00:00:00:00:05"
*.server.l2App[4].destMac = "00:00:00:00:00:06"
#------------------------------------#


